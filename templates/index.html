<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.2), 0 8px 16px rgba(0, 0, 0, 0.05);
            transition: transform 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h1 {
            font-weight: 600;
            font-size: 2rem;
            color: #1a2639;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subhead {
            color: #4a5568;
            font-size: 0.95rem;
            margin-bottom: 28px;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
            background: rgba(59, 130, 246, 0.06);
            border-radius: 0 8px 8px 0;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 6px;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1.5px solid #d1d9e6;
            background: white;
            font-size: 1rem;
            resize: vertical;
            min-height: 90px;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        .btn {
            background: #1a2639;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 14px rgba(26, 38, 57, 0.25);
        }
        .btn:hover {
            background: #2d3b52;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 38, 57, 0.3);
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 8px rgba(26, 38, 57, 0.2);
        }
        .qr-result {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px dashed rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .qr-placeholder {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            display: inline-block;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .qr-placeholder img {
            display: block;
            max-width: 220px;
            height: auto;
            border-radius: 12px;
        }
        .qr-label {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #4a5568;
            background: rgba(0,0,0,0.03);
            padding: 6px 18px;
            border-radius: 30px;
            letter-spacing: 0.2px;
        }
        .empty-state {
            color: #a0aec0;
            font-size: 0.95rem;
            padding: 20px 0;
        }
        .footer-meta {
            margin-top: 18px;
            font-size: 0.75rem;
            color: #a0aec0;
            text-align: center;
        }
        @media (max-width: 480px) {
            .card { padding: 28px 18px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⟳ QR Code</h1>
        <div class="subhead">Paste any text or URL — generate instantly.</div>

        <form method="POST">
            <div class="form-group">
                <label for="data">📝 Content</label>
                <textarea id="data" name="data" placeholder="https://github.com/your-repo or any text...">{{ request.form.get('data', '') }}</textarea>
            </div>
            <button type="submit" class="btn">⚡ Generate QR Code</button>
        </form>

        <div class="qr-result">
            {% if qr_code_data %}
                <div class="qr-placeholder">
                    <img src="{{ qr_code_data }}" alt="Generated QR Code" />
                </div>
                <span class="qr-label">✓ Ready to scan</span>
            {% else %}
                <div class="empty-state">✨ Your QR code will appear here</div>
            {% endif %}
        </div>
        <div class="footer-meta">Python · Flask · qrcode</div>
    </div>
</body>
</html>
